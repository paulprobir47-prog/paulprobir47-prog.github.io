<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:linear-gradient(135deg,#4facfe,#00f2fe);
        }

        .login-box{
            width:350px;
            background:#fff;
            padding:35px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        .login-box h2{
            text-align:center;
            margin-bottom:25px;
            color:#333;
        }

        .input-group{
            margin-bottom:20px;
        }

        .input-group label{
            display:block;
            margin-bottom:8px;
            color:#555;
            font-weight:bold;
        }

        .input-group input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            outline:none;
            font-size:16px;
            transition:.3s;
        }

        .input-group input:focus{
            border-color:#4facfe;
            box-shadow:0 0 8px rgba(79,172,254,.5);
        }

        .options{
            display:flex;
            justify-content:space-between;
            font-size:14px;
            margin-bottom:20px;
        }

        .options a{
            text-decoration:none;
            color:#4facfe;
        }

        .btn{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#4facfe;
            color:white;
            font-size:18px;
            cursor:pointer;
            transition:.3s;
        }

        .btn:hover{
            background:#008cff;
        }

        .signup{
            text-align:center;
            margin-top:20px;
            color:#555;
        }

        .signup a{
            color:#4facfe;
            text-decoration:none;
            font-weight:bold;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Login</h2>

    <form>
        <div class="input-group">
            <label>Email</label>
            <input type="email" placeholder="Enter your email" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" placeholder="Enter your password" required>
        </div>

        <div class="options">
            <label>
                <input type="checkbox"> Remember Me
            </label>
            <a href="#">Forgot Password?</a>
        </div>

        <button class="btn" type="submit">Login</button>

        <div class="signup">
            Don't have an account?
            <a href="#">Sign Up</a>
        </div>
    </form>
</div>

</body>
</html>
